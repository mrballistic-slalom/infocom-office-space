# Nginx vhost for INITECH TERMINAL — alternative to apache-initech.conf.
#
# Drop in /etc/nginx/sites-available/initech and:
#   sudo ln -s /etc/nginx/sites-available/initech /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d initech.mrballistic.com
#   sudo systemctl reload nginx

upstream initech_backend {
    server 127.0.0.1:3001 fail_timeout=10s;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name initech.mrballistic.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name initech.mrballistic.com;

    root /var/www/initech;
    index index.html;

    access_log /var/log/nginx/initech-access.log;
    error_log  /var/log/nginx/initech-error.log;

    # Hashed assets — cache forever; index.html — never cache.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|webp)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # SPA fallback — Vue router handles deep links and refreshes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to the Node backend.
    location /api/ {
        proxy_pass http://initech_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;
    }

    # Health check (optional — for an upstream monitor).
    location = /health {
        proxy_pass http://initech_backend;
        access_log off;
    }

    # TLS — certbot writes these.
    ssl_certificate     /etc/letsencrypt/live/initech.mrballistic.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/initech.mrballistic.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    # strict-origin-when-cross-origin instead of no-referrer — the latter
    # makes GA4 silently drop /g/collect requests as bot traffic.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
