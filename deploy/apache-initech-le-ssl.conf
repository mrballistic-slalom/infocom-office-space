# Apache 443 vhost for INITECH TERMINAL.
#
# certbot --apache normally generates this file by copying the port-80 vhost
# and adding SSL directives. If the port-80 vhost was a stripped-down redirect-
# only block when certbot ran (a common state during cert bootstrap), the
# generated 443 vhost will ALSO be a redirect-only block — which produces an
# infinite https → https redirect loop. This file is the fully-fleshed 443
# vhost you actually want: SPA serve from /var/www/initech, /api/* proxy to
# 127.0.0.1:3001, HSTS, cache headers.
#
# Install:
#   sudo cp deploy/apache-initech-le-ssl.conf /etc/apache2/sites-available/initech-le-ssl.conf
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#
# (sites-enabled/initech-le-ssl.conf is already a symlink to sites-available
# after certbot ran, so no a2ensite needed.)

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName initech.mrballistic.com
    DocumentRoot /var/www/initech

    ErrorLog  ${APACHE_LOG_DIR}/initech-error.log
    CustomLog ${APACHE_LOG_DIR}/initech-access.log combined

    <Directory /var/www/initech>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        # SPA fallback — let Vue router handle deep links and refreshes.
        FallbackResource /index.html
    </Directory>

    # Cache hashed JS/CSS bundles aggressively; index.html stays uncached so
    # new deploys are picked up immediately.
    <FilesMatch "\.(?:js|css|woff2?|svg|png|jpg|webp)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <Files "index.html">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </Files>

    # Reverse proxy /api/* to the Node backend on the loopback.
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass        /api/  http://127.0.0.1:3001/api/  retry=0
    ProxyPassReverse /api/  http://127.0.0.1:3001/api/

    # Defense-in-depth headers.
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    # strict-origin-when-cross-origin instead of no-referrer — the latter
    # makes GA4 silently drop /g/collect requests as bot traffic because they
    # arrive without a Referer header.
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # certbot manages these.
    SSLCertificateFile /etc/letsencrypt/live/initech.mrballistic.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/initech.mrballistic.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
