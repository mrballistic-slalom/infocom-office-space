# Apache vhost for INITECH TERMINAL.
#
# Required modules:
#   sudo a2enmod proxy proxy_http ssl headers rewrite
#
# Drop in /etc/apache2/sites-available/initech.conf and:
#   sudo a2ensite initech
#   sudo certbot --apache -d initech.mrballistic.com   # generates the SSL block
#   sudo systemctl reload apache2
#
# After certbot rewrites the file, the 443 vhost below is approximately what
# you'll end up with. Keep the ProxyPass and FallbackResource lines.

<VirtualHost *:80>
    ServerName initech.mrballistic.com
    # certbot adds an auto-redirect to HTTPS here. Until then, this proxies
    # locally for first-boot smoke testing.
    Redirect permanent / https://initech.mrballistic.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName initech.mrballistic.com
    DocumentRoot /var/www/initech

    ErrorLog  ${APACHE_LOG_DIR}/initech-error.log
    CustomLog ${APACHE_LOG_DIR}/initech-access.log combined

    <Directory /var/www/initech>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        # SPA fallback — let Vue router handle deep links and refreshes.
        FallbackResource /index.html
    </Directory>

    # Cache hashed JS/CSS bundles aggressively; index.html stays uncached so
    # new deploys are picked up immediately.
    <FilesMatch "\.(?:js|css|woff2?|svg|png|jpg|webp)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <Files "index.html">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </Files>

    # Reverse proxy /api/* to the Node backend on the loopback.
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass        /api/  http://127.0.0.1:3001/api/  retry=0
    ProxyPassReverse /api/  http://127.0.0.1:3001/api/

    # TLS — certbot writes these. Stub paths here for clarity.
    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/initech.mrballistic.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/initech.mrballistic.com/privkey.pem
    Include                 /etc/letsencrypt/options-ssl-apache.conf

    # Defense-in-depth headers. HSTS is safe once you're committed to HTTPS.
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "no-referrer"
</VirtualHost>
