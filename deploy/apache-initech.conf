# Apache vhost for INITECH TERMINAL — BOOTSTRAP version.
#
# Ship this file FIRST (port 80 only, no SSL refs). Once Apache reloads
# cleanly, run certbot:
#
#   sudo a2enmod proxy proxy_http headers rewrite ssl
#   sudo cp deploy/apache-initech.conf /etc/apache2/sites-available/initech.conf
#   sudo a2ensite initech
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d initech.mrballistic.com
#
# certbot's apache plugin will:
#   1) Provision the LE certificate via HTTP-01 (validated through this port-80 vhost)
#   2) Write a new /etc/apache2/sites-enabled/initech-le-ssl.conf with the 443 vhost
#   3) Rewrite the line below to redirect http -> https
#
# After certbot runs you'll have two vhosts. Don't try to pre-bake the 443 block
# here — Apache's configtest fails before certbot can fetch the cert.

<VirtualHost *:80>
    ServerName initech.mrballistic.com
    DocumentRoot /var/www/initech

    ErrorLog  ${APACHE_LOG_DIR}/initech-error.log
    CustomLog ${APACHE_LOG_DIR}/initech-access.log combined

    <Directory /var/www/initech>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        # SPA fallback — let Vue router handle deep links and refreshes.
        FallbackResource /index.html
    </Directory>

    # Cache hashed JS/CSS bundles aggressively; index.html stays uncached so
    # new deploys are picked up immediately.
    <FilesMatch "\.(?:js|css|woff2?|svg|png|jpg|webp)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>
    <Files "index.html">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </Files>

    # Reverse proxy /api/* to the Node backend on the loopback.
    ProxyRequests Off
    ProxyPreserveHost On
    ProxyPass        /api/  http://127.0.0.1:3001/api/  retry=0
    ProxyPassReverse /api/  http://127.0.0.1:3001/api/

    # Defense-in-depth (HSTS is added after certbot — DO NOT add it on port 80).
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "no-referrer"
</VirtualHost>

# DO NOT add a <VirtualHost *:443> block here. certbot --apache writes it for
# you after issuing the cert. The post-certbot file lives at:
#   /etc/apache2/sites-enabled/initech-le-ssl.conf
